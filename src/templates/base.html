<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Recruiting Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <style>
        :root { --bs-body-bg: #f8f9fa; }
        .role-badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 12px; }
        .role-candidate { background: #d4edda; color: #155724; }
        .role-recruiter { background: #cce5ff; color: #004085; }
        .role-hm { background: #fff3cd; color: #856404; }
        .role-cfo { background: #f8d7da; color: #721c24; }
        .role-legal { background: #e2e3e5; color: #383d41; }
        .role-interviewer { background: #d1ecf1; color: #0c5460; }
        .stage-badge { font-weight: 600; }
        .stage-intake { color: #6c757d; }
        .stage-screening { color: #0d6efd; }
        .stage-approvals { color: #ffc107; }
        .stage-interview { color: #0dcaf0; }
        .stage-offer { color: #198754; }
        .stage-hired { color: #198754; font-weight: 700; }
        .stage-rejected { color: #dc3545; }
        .widget-box { border: 1px solid #dee2e6; border-radius: 8px; background: #fff; padding: 1rem; margin-bottom: 1rem; }
        .pending-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .nav-link.active { font-weight: 700; }
        .timeline-event { border-left: 3px solid #0d6efd; padding-left: 1rem; margin-bottom: 0.5rem; }
        .timeline-event.system { border-left-color: #6c757d; }
        .timeline-event.ai { border-left-color: #198754; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">🤖 HR Agent</a>
            <div class="d-flex align-items-center gap-3">
                <form method="post" action="/set-role" class="d-flex align-items-center gap-2">
                    <label class="text-light small">Role:</label>
                    <select name="role" class="form-select form-select-sm" style="width:auto" onchange="this.form.submit()">
                        {% for r in roles %}
                        <option value="{{ r }}" {% if r == role %}selected{% endif %}>{{ r|upper }}</option>
                        {% endfor %}
                    </select>
                </form>
                <form method="post" action="/skip-time" class="d-flex align-items-center gap-2">
                    <input type="hidden" name="days" value="1">
                    <button class="btn btn-warning btn-sm">⏭ Skip 1 Day</button>
                </form>
                <span class="text-light small">Day: <strong>{{ day }}</strong></span>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <ul class="nav nav-tabs mb-3">
                    <li class="nav-item"><a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link {% if '/inbox' in request.url.path %}active{% endif %}" href="/inbox">Inbox</a></li>
                    <li class="nav-item"><a class="nav-link {% if '/logs' in request.url.path %}active{% endif %}" href="/logs">Logs</a></li>
                </ul>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="widget-box" id="process-widget"
                     hx-get="/widget" hx-trigger="every 3s" hx-swap="innerHTML">
                    <div class="text-center text-muted small">Loading process widget...</div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });

        const observer = new MutationObserver(() => {
            document.querySelectorAll('.mermaid:not([data-processed])').forEach(el => {
                el.setAttribute('data-processed', 'true');
                mermaid.run({ nodes: [el] });
            });
        });
        observer.observe(document.getElementById('process-widget'), { childList: true, subtree: true });

        document.addEventListener('htmx:afterSwap', () => {
            document.querySelectorAll('#process-widget .mermaid').forEach(el => {
                el.removeAttribute('data-processed');
            });
            mermaid.run({ nodes: document.querySelectorAll('#process-widget .mermaid') });
        });
    </script>
</body>
</html>
